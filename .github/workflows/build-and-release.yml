name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:

  build-and-release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    name: Build and Release

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch full history for changelog generation

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Build project
      run: npm run build

    - name: Get version and tag message
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          # Get tag annotation message
          TAG_MESSAGE=$(git for-each-ref --format='%(contents)' refs/tags/${GITHUB_REF#refs/tags/})
          echo "TAG_MESSAGE<<EOF" >> $GITHUB_OUTPUT
          echo "$TAG_MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        else
          echo "VERSION=latest-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
          echo "TAG_MESSAGE=Automated build from main branch" >> $GITHUB_OUTPUT
        fi

    - name: Generate changelog
      id: changelog
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        # Get previous tag
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

        if [[ -n "$PREVIOUS_TAG" ]]; then
          # Generate changelog between previous tag and current tag
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREVIOUS_TAG}..${GITHUB_REF#refs/tags/})
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "PREVIOUS_TAG=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
        else
          # First release, show all commits
          CHANGELOG=$(git log --pretty=format:"- %s (%h)")
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "PREVIOUS_TAG=first-release" >> $GITHUB_OUTPUT
        fi

    - name: Create release directory
      run: |
        mkdir -p release
        cp -r dist/* release/ 2>/dev/null || echo "No dist directory found"
#        cp package.json release/
#        cp README.md release/ 2>/dev/null || echo "No README.md found"

    - name: Create release archive
      run: |
        cd release
        tar -czf ../pacifist-bot-${{ steps.version.outputs.VERSION }}.tar.gz *
        cd ..

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ steps.version.outputs.VERSION }}
        body: |
          ## Release ${{ steps.version.outputs.VERSION }}

          ### Release Notes
          ${{ steps.version.outputs.TAG_MESSAGE }}

          ### Changes since ${{ steps.changelog.outputs.PREVIOUS_TAG }}
          ${{ steps.changelog.outputs.CHANGELOG }}

          ### Installation
          Download the `pacifist-bot-${{ steps.version.outputs.VERSION }}.tar.gz` file and extract it to your desired location.

          ### Build Information
          - Commit: ${{ github.sha }}
          - Built at: ${{ github.event.head_commit.timestamp }}
          - Previous tag: ${{ steps.changelog.outputs.PREVIOUS_TAG }}
        files: |
          pacifist-bot-${{ steps.version.outputs.VERSION }}.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pacifist-bot-${{ steps.version.outputs.VERSION }}
        path: |
          pacifist-bot-${{ steps.version.outputs.VERSION }}.tar.gz
          release/
        retention-days: 30
