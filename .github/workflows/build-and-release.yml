name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run linting
      run: npm run lint

    - name: Run tests
      run: npm run test-unit

    - name: Build project
      run: npm run build

  build-and-release:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    name: Build and Release

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build project
      run: npm run build

    - name: Get version
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=latest-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
        fi

    - name: Create release directory
      run: |
        mkdir -p release
        cp -r dist/* release/ 2>/dev/null || echo "No dist directory found"
        cp package.json release/
        cp README.md release/ 2>/dev/null || echo "No README.md found"

    - name: Create release archive
      run: |
        cd release
        tar -czf ../pacifist-bot-${{ steps.version.outputs.VERSION }}.tar.gz *
        cd ..

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ steps.version.outputs.VERSION }}
        body: |
          ## Release ${{ steps.version.outputs.VERSION }}

          ### Changes
          - Automated release from tag ${{ steps.version.outputs.VERSION }}

          ### Installation
          Download the `pacifist-bot-${{ steps.version.outputs.VERSION }}.tar.gz` file and extract it to your desired location.

          ### Build Information
          - Commit: ${{ github.sha }}
          - Built at: ${{ github.event.head_commit.timestamp }}
        files: |
          pacifist-bot-${{ steps.version.outputs.VERSION }}.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: pacifist-bot-${{ steps.version.outputs.VERSION }}
        path: |
          pacifist-bot-${{ steps.version.outputs.VERSION }}.tar.gz
          release/
        retention-days: 30
